Global:
  use_gpu: true
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 20
  save_model_dir: /workspace/exp_svtr_tiny_line/output
  save_epoch_step: 5
  eval_batch_step:
  - 0
  - 200
  cal_metric_during_train: true
  pretrained_model: /workspace/exp_svtr_tiny_line/pretrained/rec_svtr_tiny_none_ctc_ch_train/best_accuracy
  character_dict_path: /workspace/line_dataset/dict_japanese.txt
  max_text_length: 80
  infer_mode: false
  use_space_char: false
  save_res_path: /workspace/exp_svtr_tiny_line/predicts.txt
  seed: 42
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0008
    warmup_epoch: 3
  regularizer:
    name: L2
    factor: 1.0e-05
Architecture:
  model_type: rec
  algorithm: SVTR
  Transform:
    name: STN_ON
    tps_inputsize:
    - 32
    - 64
    tps_outputsize:
    - 32
    - 320
    num_control_points: 20
    tps_margins:
    - 0.05
    - 0.05
    stn_activation: none
  Backbone:
    name: SVTRNet
    img_size:
    - 32
    - 320
    out_char_num: 40
    out_channels: 192
    patch_merging: Conv
    embed_dim:
    - 64
    - 128
    - 256
    depth:
    - 3
    - 6
    - 3
    num_heads:
    - 2
    - 4
    - 8
    mixer:
    - Local
    - Local
    - Local
    - Local
    - Local
    - Local
    - Global
    - Global
    - Global
    - Global
    - Global
    - Global
    local_mixer:
    - - 7
      - 11
    - - 7
      - 11
    - - 7
      - 11
    last_stage: true
    prenorm: false
  Neck:
    name: SequenceEncoder
    encoder_type: reshape
  Head:
    name: CTCHead
Loss:
  name: CTCLoss
PostProcess:
  name: CTCLabelDecode
Metric:
  name: RecMetric
  main_indicator: norm_edit_dis
Train:
  dataset:
    name: SimpleDataSet
    data_dir: /workspace/line_dataset
    label_file_list:
    - /workspace/line_dataset/rec_gt_train.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecAug: null
    - CTCLabelEncode: null
    - SVTRRecResizeImg:
        image_shape: &id001
        - 3
        - 32
        - 320
        padding: false
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: true
    batch_size_per_card: 256
    drop_last: true
    num_workers: 12
    use_shared_memory: true
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /workspace/line_dataset
    label_file_list:
    - /workspace/line_dataset/rec_gt_val.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - SVTRRecResizeImg:
        image_shape: *id001
        padding: false
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 256
    num_workers: 12
    use_shared_memory: true
