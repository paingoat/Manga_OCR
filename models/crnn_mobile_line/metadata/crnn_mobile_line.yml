Global:
  use_gpu: true
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 20
  save_model_dir: /workspace/exp_crnn_mobile_line/output
  save_epoch_step: 5
  eval_batch_step:
  - 0
  - 93
  cal_metric_during_train: true
  pretrained_model: /workspace/exp_crnn_mobile_line/pretrained/ch_ppocr_mobile_v2.0_rec_train/best_accuracy
  character_dict_path: /workspace/line_dataset/dict_japanese.txt
  max_text_length: 80
  infer_mode: false
  use_space_char: false
  save_res_path: /workspace/exp_crnn_mobile_line/predicts.txt
  seed: 42
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0015
    warmup_epoch: 8
  regularizer:
    name: L2
    factor: 1.0e-05
Architecture:
  model_type: rec
  algorithm: CRNN
  Transform: null
  Backbone:
    name: MobileNetV3
    scale: 0.5
    model_name: small
    small_stride:
    - 1
    - 2
    - 2
    - 2
  Neck:
    name: SequenceEncoder
    encoder_type: rnn
    hidden_size: 48
  Head:
    name: CTCHead
    fc_decay: 1.0e-05
Loss:
  name: CTCLoss
PostProcess:
  name: CTCLabelDecode
Metric:
  name: RecMetric
  main_indicator: norm_edit_dis
Train:
  dataset:
    name: SimpleDataSet
    data_dir: /workspace/line_dataset
    label_file_list:
    - /workspace/line_dataset/rec_gt_train.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecAug: null
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape: &id001
        - 3
        - 32
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: true
    batch_size_per_card: 512
    drop_last: true
    num_workers: 16
    use_shared_memory: true
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /workspace/line_dataset
    label_file_list:
    - /workspace/line_dataset/rec_gt_val.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape: *id001
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 512
    num_workers: 16
    use_shared_memory: true
